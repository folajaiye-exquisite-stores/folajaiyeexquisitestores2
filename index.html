<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folajaiye Exquisite Stores</title>
<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    background: linear-gradient(135deg, #f6f0ff 0%, #fff7f0 100%);
    color:#333;
}
header{text-align:center;padding:20px;}
header img{max-width:350px;border-radius:10px;}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
    max-width:1200px;
    margin:auto;
}
.product{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
    text-align:center;
}
.product:hover{transform:translateY(-5px);}
.product img{
    width:100%;
    display:block;
    cursor:pointer;
    border-radius:10px;
}
.order-btn{
    display:block;
    margin:10px auto 20px;
    background:#6b3fa0;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:5px;
    width:80%;
}
.order-btn:hover{background:#4c3382;}
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 20px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
/* Lightbox overlay */
#lightboxOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#lightboxOverlay img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}
</style>
</head>
<body>

<header>
<img src="banner.jpg" alt="Folajaiye Exquisite Stores">
</header>

<section class="products" id="product-section">
<!-- Dress images will populate here -->
</section>

<a class="whatsapp" href="https://wa.me/2348066493911">Chat on WhatsApp</a>

<!-- Lightbox overlay -->
<div id="lightboxOverlay">
    <img id="lightboxImg" src="">
</div>

    overlay.style.display = "flex";

    this.style.display = "none";
}
