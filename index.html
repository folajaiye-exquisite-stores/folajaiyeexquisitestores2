<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folajaiye Exquisite Stores</title>
<style>
body{font-family:Arial;margin:0;background:#faf7ff;}
header{text-align:center;padding:20px;}
header img{max-width:350px;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px;max-width:1000px;margin:auto;}
.product{background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);transition:0.3s;text-align:center;}
.product:hover{transform:translateY(-5px);}
.product img{width:100%;display:block;}
.color-name{margin:10px 0;font-weight:bold;}
.order-btn{display:block;margin:10px auto 20px;background:#6b3fa0;color:white;padding:10px 20px;text-decoration:none;border-radius:5px;width:80%;}
.order-btn:hover{background:#4c3382;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px 20px;border-radius:50px;text-decoration:none;font-weight:bold;box-shadow:0 5px 15px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<header>
<img src="banner.jpg" alt="Folajaiye Exquisite Stores">
</header>

<section class="products" id="product-section">
<!-- Dress images will auto-populate here -->
</section>

<a class="whatsapp" href="https://wa.me/2348066493911">Chat on WhatsApp</a>

<script>
// Human-readable color detection
function rgbToColorName(r,g,b){
    const colors = {
        "Red":[255,0,0],
        "Green":[0,128,0],
        "Blue":[0,0,255],
        "Yellow":[255,255,0],
        "Orange":[255,165,0],
        "Purple":[128,0,128],
        "Pink":[255,192,203],
        "Brown":[165,42,42],
        "Gray":[128,128,128],
        "Black":[0,0,0],
        "White":[255,255,255]
    };
    let minDiff = 1000;
    let closestColor = "Unknown";
    for(let color in colors){
        let [cr,cg,cb] = colors[color];
        let diff = Math.sqrt((r-cr)**2 + (g-cg)**2 + (b-cb)**2);
        if(diff < minDiff){
            minDiff = diff;
            closestColor = color;
        }
    }
    return closestColor;
}

// Detect main color of an image
function getMainColor(img,callback){
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img,0,0,img.width,img.height);
    const data = ctx.getImageData(0,0,img.width,img.height).data;
    let r=0,g=0,b=0,count=0;
    for(let i=0;i<data.length;i+=4){
        r += data[i];
        g += data[i+1];
        b += data[i+2];
        count++;
    }
    r=Math.floor(r/count);
    g=Math.floor(g/count);
    b=Math.floor(b/count);
    callback(rgbToColorName(r,g,b));
}

// Automatically add all dress images in the folder
const dressCount = 20; // max number of dresses you want to support
const section = document.getElementById("product-section");

for(let i=1;i<=dressCount;i++){
    const src = `dress${i}.jpg`;
    const div = document.createElement("div");
    div.className = "product";

    const img = document.createElement("img");
    img.src = src;
    img.alt = `Dress ${i}`;

    const colorName = document.createElement("div");
    colorName.className = "color-name";
    colorName.innerText = "Detecting color...";

    const btn = document.createElement("a");
    btn.className = "order-btn";
    btn.href = "https://wa.me/2348066493911";
    btn.innerText = "Order on WhatsApp";

    div.appendChild(img);
    div.appendChild(colorName);
    div.appendChild(btn);
    section.appendChild(div);

    img.onload = ()=>{
        getMainColor(img,(color)=>{
            colorName.innerText = `Dress Color: ${color}`;
        });
    }
    img.onerror = ()=>{
        div.style.display = "none"; // hide missing images
    }
}
</script>

</body>
</html>
